name : Pytest CI

on :
  push :
    branches :
      ['*']

jobs :
  build :
    runs-on : ubuntu-latest
    steps :
      - uses : actions/checkout@v2
      - name : Set up Python
        uses : actions/setup-python@v4
        with :
          python-version : "3.11"
      - name : Install dependencies
        run : |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name : Run tests with coverage
        run : |
          PYTHONPATH=. pytest tests/ --cov=src --cov=web --cov-config=.coveragerc --cov-report=term-missing --cov-report=xml
